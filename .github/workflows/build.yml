name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: audio_station-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: audio_station-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: audio_station-windows-x86_64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: audio_station-windows-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo tee /etc/apt/sources.list.d/arm64.list > /dev/null << EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe
          EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libasound2-dev:arm64 pkg-config

      - name: Configure cross-compilation (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Install Windows cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: |
          rustup target add aarch64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          cp target/${{ matrix.target }}/release/audio_station ${{ matrix.artifact_name }}

      - name: Prepare artifacts (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          cp target/${{ matrix.target }}/release/audio_station.exe ${{ matrix.artifact_name }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}${{ startsWith(matrix.os, 'windows') && '.exe' || '' }}
          retention-days: 30
