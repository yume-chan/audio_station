name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: audio_station-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: audio_station-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: audio_station-windows-x86_64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: audio_station-windows-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          cp target/${{ matrix.target }}/release/audio_station ${{ matrix.artifact_name }}

      - name: Prepare artifacts (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          cp target/${{ matrix.target }}/release/audio_station.exe ${{ matrix.artifact_name }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}${{ startsWith(matrix.os, 'windows') && '.exe' || '' }}
          retention-days: 30
